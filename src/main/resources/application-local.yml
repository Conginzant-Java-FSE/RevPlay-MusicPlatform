spring:
  config:
    activate:
      on-profile: local
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
          starttls:
            enable: true
