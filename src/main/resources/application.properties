spring.application.name=revplay

spring.datasource.url=jdbc:mysql://localhost:3306/revplay
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080

revplay.jwt.secret=revplay_secret_key_revplay_secret_key_123456
revplay.jwt.access-token-expiry=86400000
revplay.jwt.refresh-token-expiry=604800000
revplay.jwt.issuer=revplay