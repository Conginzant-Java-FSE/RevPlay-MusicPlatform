spring.application.name=revplay

spring.datasource.url = jdbc:mysql://localhost:3306/revplay
spring.datasource.username = root
spring.datasource.password = ${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true




# Recommended: avoid Open Session In View warning
spring.jpa.open-in-view=false

# Multipart upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=60MB

# Base storage folder
revplay.storage.base-path=storage

# Public URL mapping for playing
revplay.media.base-url=/media

server.port = 8080

